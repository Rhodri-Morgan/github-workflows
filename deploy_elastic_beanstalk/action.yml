name: "Deploy to Elastic Beanstalk"
description: "Updates SSM image tag and deploys a new application version to Elastic Beanstalk"

inputs:
  image-repo:
    description: "ECR repository name"
    required: true
  image-tag:
    description: "Image tag to deploy (e.g. commit SHA)"
    required: true
  aws-region:
    description: "AWS region (e.g. eu-west-1, us-west-2)"
    required: true
  account-id:
    description: "AWS account ID"
    required: true
  role-arn:
    description: "IAM role ARN for deployment"
    required: true
  image-tag-ssm-parameter:
    description: "SSM parameter name that stores the image tag"
    required: true
  eb-application:
    description: "Elastic Beanstalk application name"
    required: true
  eb-environment:
    description: "Elastic Beanstalk environment name"
    required: true
  eb-deployment-bucket:
    description: "S3 bucket for Dockerrun.aws.json"
    required: true
  wait-timeout:
    description: "Maximum time in seconds to wait for deployment to complete"
    required: false
    default: "300"

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.role-arn }}
        role-duration-seconds: 1200

    - name: Set environment variables
      shell: bash
      run: |
        echo "IMAGE_REGISTRY=${{ inputs.account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com" >> $GITHUB_ENV

    - name: Verify image exists in ECR
      shell: bash
      run: |
        set -e
        aws ecr describe-images \
          --repository-name ${{ inputs.image-repo }} \
          --image-ids imageTag=${{ inputs.image-tag }} \
          --query 'imageDetails[0].imageTags' \
          --output text > /dev/null
        echo "Image ${{ inputs.image-repo }}:${{ inputs.image-tag }} verified in ECR"

    - name: Capture current state for rollback
      id: previous
      shell: bash
      run: |
        set -e
        PREVIOUS_TAG=$(aws ssm get-parameter \
          --name "${{ inputs.image-tag-ssm-parameter }}" \
          --query 'Parameter.Value' \
          --output text)
        echo "previous-tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

        PREVIOUS_VERSION=$(aws elasticbeanstalk describe-environments \
          --environment-names "${{ inputs.eb-environment }}" \
          --query 'Environments[0].VersionLabel' \
          --output text)
        echo "previous-version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

        echo "Current state: SSM=$PREVIOUS_TAG, EB version=$PREVIOUS_VERSION"

    - name: Update Dockerrun.aws.json and create application version
      id: version
      shell: bash
      run: |
        set -e
        VERSION_LABEL="${{ inputs.image-repo }}-${{ inputs.image-tag }}"
        DOCKER_IMAGE="${IMAGE_REGISTRY}/${{ inputs.image-repo }}:${{ inputs.image-tag }}"
        S3_KEY="${{ inputs.image-repo }}/Dockerrun.aws.json"
        EXISTING_VERSION=$(aws elasticbeanstalk describe-application-versions \
          --application-name "${{ inputs.eb-application }}" \
          --version-labels "$VERSION_LABEL" \
          --query 'ApplicationVersions[0].VersionLabel' \
          --output text)

        if [ "$EXISTING_VERSION" = "$VERSION_LABEL" ]; then
          echo "Application version already exists: $VERSION_LABEL"
          echo "version-label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          exit 0
        fi

        aws s3 cp "s3://${{ inputs.eb-deployment-bucket }}/$S3_KEY" /tmp/Dockerrun.aws.json

        jq --arg image "$DOCKER_IMAGE" '.Image.Name = $image' /tmp/Dockerrun.aws.json > /tmp/Dockerrun.updated.json
        mv /tmp/Dockerrun.updated.json /tmp/Dockerrun.aws.json

        aws s3 cp /tmp/Dockerrun.aws.json "s3://${{ inputs.eb-deployment-bucket }}/$S3_KEY"

        aws elasticbeanstalk create-application-version \
          --application-name "${{ inputs.eb-application }}" \
          --version-label "$VERSION_LABEL" \
          --description "Image: ${{ inputs.image-repo }}:${{ inputs.image-tag }}" \
          --source-bundle S3Bucket="${{ inputs.eb-deployment-bucket }}",S3Key="$S3_KEY"

        echo "version-label=$VERSION_LABEL" >> $GITHUB_OUTPUT
        echo "Created application version: $VERSION_LABEL"

    - name: Deploy to environment
      shell: bash
      run: |
        set -e
        aws elasticbeanstalk update-environment \
          --environment-name "${{ inputs.eb-environment }}" \
          --version-label "${{ steps.version.outputs.version-label }}"
        echo "Deploying ${{ steps.version.outputs.version-label }} to ${{ inputs.eb-environment }}"

    - name: Wait for deployment
      id: wait
      shell: bash
      run: |
        set -eo pipefail
        TIMEOUT=${{ inputs.wait-timeout }}
        INTERVAL=10
        ELAPSED=0

        echo "Waiting up to ${TIMEOUT}s for environment to be ready..."
        while [ $ELAPSED -lt $TIMEOUT ]; do
          STATUS=$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ inputs.eb-environment }}" \
            --query 'Environments[0].Status' \
            --output text)
          HEALTH=$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ inputs.eb-environment }}" \
            --query 'Environments[0].HealthStatus' \
            --output text)

          echo "Status=$STATUS Health=$HEALTH (${ELAPSED}s/${TIMEOUT}s)"

          if [ "$STATUS" = "Ready" ]; then
            echo "Deployment complete"
            echo "failed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        echo "::error::Deployment timed out after ${TIMEOUT}s"
        echo "failed=true" >> $GITHUB_OUTPUT

    - name: Update SSM parameter
      if: steps.wait.outputs.failed == 'false'
      shell: bash
      run: |
        set -e
        aws ssm put-parameter \
          --name "${{ inputs.image-tag-ssm-parameter }}" \
          --value "${{ inputs.image-tag }}" \
          --type String \
          --overwrite
        echo "Updated ${{ inputs.image-tag-ssm-parameter }} to ${{ inputs.image-tag }}"

    - name: Rollback on failure
      if: steps.wait.outputs.failed == 'true'
      shell: bash
      run: |
        set -e
        PREVIOUS_TAG="${{ steps.previous.outputs.previous-tag }}"
        PREVIOUS_VERSION="${{ steps.previous.outputs.previous-version }}"
        PREVIOUS_IMAGE="${IMAGE_REGISTRY}/${{ inputs.image-repo }}:${PREVIOUS_TAG}"
        S3_KEY="${{ inputs.image-repo }}/Dockerrun.aws.json"

        echo "::warning::Rolling back to previous state: EB version=$PREVIOUS_VERSION"

        aws s3 cp "s3://${{ inputs.eb-deployment-bucket }}/$S3_KEY" /tmp/Dockerrun.aws.json
        jq --arg image "$PREVIOUS_IMAGE" '.Image.Name = $image' /tmp/Dockerrun.aws.json > /tmp/Dockerrun.rollback.json
        mv /tmp/Dockerrun.rollback.json /tmp/Dockerrun.aws.json
        aws s3 cp /tmp/Dockerrun.aws.json "s3://${{ inputs.eb-deployment-bucket }}/$S3_KEY"

        aws elasticbeanstalk update-environment \
          --environment-name "${{ inputs.eb-environment }}" \
          --version-label "$PREVIOUS_VERSION"

        echo "Rollback initiated — waiting for environment..."
        aws elasticbeanstalk wait environment-updated \
          --environment-name "${{ inputs.eb-environment }}"
        echo "Rollback complete"

    - name: Fail workflow if deployment failed
      if: steps.wait.outputs.failed == 'true'
      shell: bash
      run: |
        echo "::error::Deployment failed. Rolled back to ${{ steps.previous.outputs.previous-version }}"
        exit 1
