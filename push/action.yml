name: "Push to ECR"
description: "Tags and pushes a local Docker image to an ECR registry"

inputs:
  image-repo:
    description: "ECR repository name"
    required: true
  image-tag:
    description: "Image tag to push"
    required: true
  aws-region:
    description: "AWS region (e.g. eu-west-1, us-west-2)"
    required: true
  account-id:
    description: "AWS account ID"
    required: true
  role-arn:
    description: "IAM role ARN for ECR push"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set environment variables
      shell: bash
      run: |
        echo "IMAGE_REGISTRY=${{ inputs.account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com" >> $GITHUB_ENV

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.role-arn }}
        role-duration-seconds: 1200

    - name: Check tag doesn't already exist in ECR
      shell: bash
      run: |
        set -e
        image_exists=$(aws ecr describe-images --repository-name ${{ inputs.image-repo }} --image-ids imageTag=${{ inputs.image-tag }} --query 'imageDetails' --output text || true)
        if [[ -n "$image_exists" ]]; then
          echo "Tag (${{ inputs.image-tag }}) for this repo already exists"
          exit 1
        fi

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Tag image for registry
      shell: bash
      run: |
        docker tag local/${{ inputs.image-repo }}:${{ inputs.image-tag }} $IMAGE_REGISTRY/${{ inputs.image-repo }}:${{ inputs.image-tag }}

    - name: Push image to ECR
      shell: bash
      run: |
        docker push $IMAGE_REGISTRY/${{ inputs.image-repo }}:${{ inputs.image-tag }}
